<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Login Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chosen Palette: Calm Neutrals with Blue Accent -->
    <!-- Application Structure Plan: The SPA uses a central card-based layout to focus user attention on the login task. A tab-like button navigation at the top of the card allows users to seamlessly switch between three roles: Student, Teacher, and Admin. This tabbed structure was chosen over a dropdown or separate pages because it makes all roles immediately visible and accessible with a single click, enhancing usability and speed. The user flow is: select role -> enter credentials -> click login. JavaScript handles the state management of the selected role and provides interactive feedback, such as updating button styles and displaying a confirmation message upon submission, creating a fluid and intuitive experience. -->
    <!-- Visualization & Content Choices: The core task is authentication, not data visualization. Therefore, standard HTML form elements are used, enhanced with Tailwind CSS for a modern UI. Report Info: User Roles (Student, Teacher, Admin) -> Goal: Organize/Select -> Presentation: HTML buttons as tabs -> Interaction: JS onClick to update active role state and UI styling -> Justification: More intuitive and discoverable than a dropdown. Report Info: Credentials (Username, Password) -> Goal: Inform/Input -> Presentation: Styled HTML input fields -> Interaction: Standard text entry + a JS-powered show/hide password toggle -> Justification: Familiar user pattern enhanced with a common usability feature (password visibility). Report Info: Action Confirmation -> Goal: Inform -> Presentation: HTML paragraph tag for messages -> Interaction: JS updates text content on login attempt -> Justification: Provides non-disruptive user feedback. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            transition: all 0.3s ease-in-out;
            background-color: #ffffff;
        }
        .tab-btn {
            transition: all 0.2s ease-in-out;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            border-bottom-color: #3b82f6; /* blue-500 */
            color: #3b82f6;
        }
        .form-input {
            transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.4);
        }
        .submit-btn {
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
        }
        .submit-btn:hover {
            background-color: #2563eb; /* blue-600 */
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .password-toggle {
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div id="login-container" class="w-full max-w-md mx-auto p-4">
        <div class="login-card rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Welcome Back</h1>
                <p class="text-gray-500 mt-2">Please select your role and sign in.</p>
            </div>

            <div class="mb-6">
                <div class="flex justify-around border-b border-gray-200">
                    <button id="role-student" class="tab-btn w-full py-3 font-semibold text-gray-600 active" onclick="selectRole('Student')">Student</button>
                    <button id="role-teacher" class="tab-btn w-full py-3 font-semibold text-gray-600" onclick="selectRole('Teacher')">Teacher</button>
                    <button id="role-admin" class="tab-btn w-full py-3 font-semibold text-gray-600" onclick="selectRole('Admin')">Admin</button>
                </div>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" name="username" required class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500" placeholder="Enter your username">
                </div>

                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500" placeholder="Enter your password">
                        <span id="password-toggle" class="password-toggle absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 text-gray-500 hover:text-gray-700">
                            <span class="eye-icon">👁️</span>
                        </span>
                    </div>
                </div>

                <div class="mb-4">
                    <button type="submit" class="submit-btn w-full bg-blue-500 text-white font-bold py-3 px-4 rounded-lg focus:outline-none focus:shadow-outline">
                        Sign In
                    </button>
                </div>

                 <div id="feedback-message" class="text-center text-sm h-5"></div>
            </form>

            <div class="text-center mt-6">
                <a href="#" class="text-sm text-blue-500 hover:underline">Forgot your password?</a>
            </div>
        </div>
    </div>

    <script>
        let selectedRole = 'Student';

        const roleStudentBtn = document.getElementById('role-student');
        const roleTeacherBtn = document.getElementById('role-teacher');
        const roleAdminBtn = document.getElementById('role-admin');
        const feedbackMessage = document.getElementById('feedback-message');
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('password-toggle');
        const eyeIcon = passwordToggle.querySelector('.eye-icon');

        function selectRole(role) {
            selectedRole = role;
            updateRoleUI();
        }

        function updateRoleUI() {
            roleStudentBtn.classList.remove('active');
            roleTeacherBtn.classList.remove('active');
            roleAdminBtn.classList.remove('active');

            if (selectedRole === 'Student') {
                roleStudentBtn.classList.add('active');
            } else if (selectedRole === 'Teacher') {
                roleTeacherBtn.classList.add('active');
            } else if (selectedRole === 'Admin') {
                roleAdminBtn.classList.add('active');
            }
            feedbackMessage.textContent = '';
        }
        
        passwordToggle.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️';
            }
        });

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            
            if (!username || !passwordInput.value) {
                feedbackMessage.textContent = 'Please fill in all fields.';
                feedbackMessage.style.color = '#ef4444'; // red-500
                return;
            }

            feedbackMessage.style.color = '#6b7280'; // gray-500
            feedbackMessage.textContent = `Attempting to log in as ${selectedRole}...`;

            setTimeout(() => {
                feedbackMessage.style.color = '#22c55e'; // green-500
                feedbackMessage.textContent = `Successfully logged in as ${username}!`;
            }, 1500);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            updateRoleUI();
        });
    </script>

</body>
</html>
